<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b;
            --primary: #4f46e5; --border: #e2e8f0;
        }
        .dark {
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; --border: #334155;
        }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg);
            color: var(--text-main); margin: 0; padding: 20px; transition: background 0.3s ease;
        }
        .container { max-width: 480px; margin: 40px auto; width: 100%; }
        .card {
            background: var(--card-bg); padding: 24px; border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid var(--border);
        }
        form { display: flex; flex-direction: column; gap: 15px; }
        input, select, button {
            padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--card-bg); color: var(--text-main); font-size: 14px; outline: none;
        }
        .btn-save { background: var(--primary); color: white; font-weight: 600; border: none; cursor: pointer; }
        .btn-cancel { 
            text-align: center; text-decoration: none; color: var(--text-main); 
            font-size: 14px; opacity: 0.7; margin-top: 10px; 
        }
        h2 { margin-top: 0; margin-bottom: 20px; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>✏️ Edit Task</h2>
        <form action="/edit/{{ task['id'] }}" method="POST">
            <label style="font-size: 12px; font-weight: 600;">Task Description</label>
            <input type="text" name="task" value="{{ task['task'] }}" required>
            
            <label style="font-size: 12px; font-weight: 600;">Due Date</label>
            <input type="date" name="due_date" value="{{ task['due_date'] }}" required>
            
            <label style="font-size: 12px; font-weight: 600;">Priority</label>
            <select name="priority">
                <option value="low" {% if task['priority'] == 'low' %}selected{% endif %}>Low Priority</option>
                <option value="medium" {% if task['priority'] == 'medium' %}selected{% endif %}>Medium</option>
                <option value="high" {% if task['priority'] == 'high' %}selected{% endif %}>Urgent</option>
            </select>
            
            <button type="submit" class="btn-save">Update Task</button>
            <a href="/" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>

<script>
    // Keep dark mode consistent with main page
    window.onload = () => {
        if (localStorage.getItem("mode") === "dark") document.body.classList.add("dark");
    };
</script>

</body>
</html>
